{% extends 'base.html' %}

{% block content %}
<section class="panel form-panel">
  <div class="panel-head">
      <div>
        <div class="panel-title">{{ title }}</div>
        <div class="panel-subtitle">保存仅更新节点资料；真正安装请到节点详情页点“开始部署”或“重新部署”。</div>
      </div>

    <div class="panel-actions">
      <a class="ghost-btn link-plain" href="{% if node_id %}/nodes/{{ node_id }}{% else %}/nodes{% endif %}">返回</a>
    </div>
  </div>

  {% if errors %}
  <div class="error-box form-errors">
    <ul>
      {% for error in errors %}
      <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </div>
  {% endif %}

  <form method="post" class="stack-form">
    <div class="form-grid">
      <label>
        <span>节点名</span>
        <input type="text" name="name" value="{{ form_values['name'] }}" required>
      </label>
      <label>
        <span>NAT IP</span>
        <input type="text" name="ip" value="{{ form_values['ip'] }}" required>
      </label>
      <label>
        <span>SSH 端口</span>
        <input type="number" name="ssh_port" value="{{ form_values['ssh_port'] }}" min="1" max="65535" required>
      </label>
      <label>
        <span>SSH 用户名</span>
        <input type="text" name="ssh_user" value="{{ form_values['ssh_user'] }}" required>
      </label>
      <label class="full-span">
        <span>SSH 密码</span>
        <input type="text" name="ssh_password" value="{{ form_values['ssh_password'] }}" required>
      </label>
      <label>
        <span>公网端口</span>
        <input type="number" name="public_port" value="{{ form_values['public_port'] }}" min="1" max="65535" required>
      </label>
      <label>
        <span>内网监听端口</span>
        <input type="number" name="listen_port" value="{{ form_values['listen_port'] }}" min="1" max="65535" required>
      </label>
    </div>

    <div class="form-footer">
      <button type="submit">{% if mode == 'edit' %}保存修改{% else %}创建节点{% endif %}</button>
    </div>
  </form>
</section>
{% endblock %}
